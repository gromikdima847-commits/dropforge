<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DropForge FULLSCREEN</title>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
}

body{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:radial-gradient(circle,#0b1630,#05060a);
}

/* FULL SCREEN GAME LAYOUT */
#game{
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* HUD */
#hud{
position:fixed;
top:10px;
display:flex;
gap:10px;
}

.box{
background:rgba(0,0,0,0.6);
padding:10px 14px;
border-radius:10px;
font-weight:bold;
font-size:16px;
}

/* BUTTONS */
button{
width:280px;
padding:12px;
margin:6px;
border:none;
border-radius:12px;
cursor:pointer;
background:#222;
color:white;
transition:0.2s;
font-size:16px;
}

button:hover{transform:scale(1.05)}

/* TEXT */
#roll{margin-top:15px;font-size:20px}
#res{margin-top:10px;font-size:30px}

/* INVENTORY FULL WIDTH */
#inv{
margin-top:20px;
width:90%;
max-width:900px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.card{
background:#111;
padding:10px;
border-radius:10px;
font-size:12px;
text-align:center;
}

/* CENTER WRAPPER */
.menu{
display:flex;
flex-direction:column;
align-items:center;
}
</style>
</head>

<body>

<div id="game">

<div id="hud">
<div class="box" id="lvl">⭐ LVL 1 | XP 0</div>
<div class="box" id="bal">💰 100</div>
</div>

<div class="menu">
<button onclick="openCase()">🎡 Open Case</button>
<button onclick="daily()">🎁 Daily</button>
<button onclick="admin()">🧑‍💼 Admin</button>
<button onclick="showInv()">🎒 Inventory</button>
</div>

<div id="roll"></div>
<div id="res"></div>
<div id="inv"></div>

</div>

<script>

let coins=100;
let xp=0;
let lvl=1;
let inv=[];
let pity=0;
let streak=0;
let lastDaily=0;

const bal=document.getElementById("bal");
const lvlUI=document.getElementById("lvl");
const roll=document.getElementById("roll");
const res=document.getElementById("res");

function update(){
bal.innerText="💰 "+coins;
lvlUI.innerText="⭐ LVL "+lvl+" | XP "+xp;
}

function luck(){
return 1 + pity*0.05 + streak*0.06;
}

/* CASE */
const items=[
{name:"AK Neon",chance:55,color:"#4cc2ff"},
{name:"Gold Knife",chance:30,color:"#ffcc4c"},
{name:"ARCANA",chance:15,color:"#ff4cf0"}
];

/* SPIN */
async function spin(){
for(let i=0;i<25;i++){
let f=items[Math.floor(Math.random()*items.length)];
roll.innerText="🎡 "+f.name;
await new Promise(r=>setTimeout(r,30+i*3));
}
}

/* CASE OPEN */
async function openCase(){

if(coins<10) return;

coins-=10;

await spin();

let r=(Math.random()*100)/luck();
let sum=0;
let win=items[0];

for(let i of items){
sum+=i.chance;
if(r<=sum) win=i;
}

inv.push(win);

res.innerText="🎁 "+win.name;
res.style.color=win.color;

if(win.name==="ARCANA"){
streak=0;pity=0;
document.body.style.filter="brightness(1.5)";
setTimeout(()=>document.body.style.filter="brightness(1)",120);
}else{
streak++;pity++;
}

xp+=10;
if(xp>=100){
xp=0;
lvl++;
coins+=25;
}

update();
render();
}

/* INVENTORY */
function render(){
let box=document.getElementById("inv");

let map={};
inv.forEach(i=>map[i.name]=(map[i.name]||0)+1);

box.innerHTML=Object.keys(map).map(k=>
`<div class="card">${k}<br>x${map[k]}</div>`
).join("");
}

function showInv(){render()}

/* DAILY */
function daily(){
let now=Date.now();
if(now-lastDaily<86400000){
alert("Already claimed");
return;
}

lastDaily=now;
coins+=100;
update();
}

/* ADMIN */
function admin(){
let p=prompt("pass");
if(p!="1234") return;

alert("coins:"+coins+"\nitems:"+inv.length);
}

/* INIT */
update();
render();

</script>

</body>
</html>
