<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DropForge Market V4</title>

<style>
html,body{
margin:0;
padding:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111827;
}

.logo{
font-size:20px;
font-weight:bold;
color:#4cc2ff;
}

.balance{
background:#1f2937;
padding:8px 12px;
border-radius:10px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:12px;
padding:15px;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
border-color:#4cc2ff;
box-shadow:0 0 15px #4cc2ff33;
}

.case-img{
width:100%;
height:80px;
background:#0f172a;
border-radius:10px;
margin-bottom:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:#aaa;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#222;
color:white;
}

button:hover{background:#333}

#hud{
display:flex;
gap:10px;
padding:10px 20px;
}

.hudbox{
background:#0f172a;
padding:8px 12px;
border-radius:10px;
}

#roll{
text-align:center;
margin-top:10px;
font-size:18px;
}

#res{
text-align:center;
font-size:28px;
margin-top:5px;
}

#inv{
display:none;
padding:20px;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}

.item{
background:#0f172a;
padding:10px;
border-radius:10px;
text-align:center;
border:1px solid #222;
}

.glow{
animation:glow 0.5s ease;
}

@keyframes glow{
0%{box-shadow:0 0 0px #fff}
50%{box-shadow:0 0 25px #4cc2ff}
100%{box-shadow:0 0 0px #fff}
}
</style>
</head>

<body>

<header>
<div class="logo">💎 DropForge Market V4</div>
<div class="balance" id="bal">💰 100</div>
</header>

<div id="hud">
<div class="hudbox" id="lvl">⭐ LVL 1</div>
</div>

<div class="container" id="shop"></div>

<div id="roll"></div>
<div id="res"></div>

<div id="inv"></div>

<script>

let coins=100;
let xp=0;
let lvl=1;
let pity=0;
let inv={};

const bal=document.getElementById("bal");
const roll=document.getElementById("roll");
const res=document.getElementById("res");

/* CASES (market style) */
const cases=[
{name:"Дешёвый кейс",price:10,item:"Blue Skin",rarity:"common"},
{name:"Редкий кейс",price:25,item:"Gold Knife",rarity:"rare"},
{name:"Легенда кейс",price:50,item:"ARCANA",rarity:"legendary"}
];

/* SHOP */
function renderShop(){
document.getElementById("shop").innerHTML=
cases.map((c,i)=>
`
<div class="card">
<div class="case-img">CASE IMAGE</div>
<h3>${c.name}</h3>
<p>Цена: ${c.price}</p>
<button onclick="openCase(${i})">Открыть</button>
</div>
`
).join("");
}

/* SPIN */
async function spin(text){
for(let i=0;i<18;i++){
roll.innerText="🎡 "+cases[Math.floor(Math.random()*cases.length)].item;
await new Promise(r=>setTimeout(r,35));
}
roll.innerText="🎁 "+text;
}

/* OPEN CASE */
async function openCase(i){

let c=cases[i];
if(coins<c.price) return;

coins-=c.price;

await spin(c.item);

/* luck system */
let luck=1+pity*0.04;
let rollv=Math.random()*100/luck;

let win=c;

if(!inv[c.item]) inv[c.item]=0;
inv[c.item]++;

res.innerText="🎁 "+c.item;

/* rare effect */
if(c.rarity==="legendary"){
document.body.classList.add("glow");
setTimeout(()=>document.body.classList.remove("glow"),500);
pity=0;
}else{
pity++;
}

/* XP */
xp+=10;
if(xp>=100){
xp=0;
lvl++;
coins+=20;
}

update();
renderInv();
}

/* INVENTORY */
function renderInv(){
document.getElementById("inv").innerHTML=
Object.keys(inv).map(k=>
`<div class="item">${k}<br>x${inv[k]}</div>`
).join("");
}

/* UPDATE */
function update(){
bal.innerText="💰 "+coins;
lvl.innerText="⭐ LVL "+lvl;
}

/* INIT */
renderShop();
update();

</script>

</body>
</html>
